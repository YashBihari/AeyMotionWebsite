<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url(&apos;https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,750&amp;display=swap&apos;);
      .logo-text {
        font-family: &apos;Playfair Display&apos;, Georgia, serif;
        font-style: italic;
        font-weight: 750;
        fill: #ffffff;
        font-size: 150px;
        text-anchor: middle;
        dominant-baseline: middle;
      }
    </style>
    <linearGradient id="sunset-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4B179" />
      <stop offset="45%" stop-color="#E0B3CF" />
      <stop offset="100%" stop-color="#8A2EFF" />
    </linearGradient>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Gradient background circle -->
  <circle cx="256" cy="256" r="230" fill="url(#sunset-gradient)" />
  
  <!-- "aey" text with clean drop shadow -->
  <text x="256" y="246" class="logo-text" filter="url(#drop-shadow)">aey</text>
</svg>
